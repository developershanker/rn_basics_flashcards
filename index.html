<html lang="en">
<head>
<meta charset="UTF-8" />

<title>Senior React Native — Interview Flashcards</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>

  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--dark);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 4rem;
  }

  /* ── Header ── */
  .header { text-align: center; margin-bottom: 2.5rem; }
  .header h1 { font-size: 1.6rem; font-weight: 600; color: var(--dark); letter-spacing: -0.02em; }

  .container { width: 100%; max-width: 740px; }

  .progress-wrap { height: 5px; background: var(--border); border-radius: 3px; margin-bottom: 1.25rem; overflow: hidden; }
  .progress-fill { height: 5px; background: var(--blue); border-radius: 3px; transition: width 0.4s ease; }

  .scene { perspective: 1400px; width: 100%; min-height: 360px; cursor: pointer; margin-bottom: 1rem; }

    position: relative; width: 100%; min-height: 360px;

  .q-text { font-size: 1.25rem; font-weight: 500; color: var(--dark); line-height: 1.5; flex: 1; }

  /* Back */
  .a-label { font-size: 0.65rem; font-weight: 600; color: var(--teal); letter-spacing: 0.12em; margin-bottom: 0.75rem; }
  .a-text { font-size: 0.9rem; color: var(--dark); line-height: 1.7; }
  .a-text br { display: block; margin: 2px 0; }

  .code-label { background: #334155; color: #94A3B8; font-size: 0.65rem; font-weight: 600; letter-spacing: 0.08em; padding: 6px 14px; }
  .code-block {
    background: var(--code-bg);
    color: var(--code-text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;

    padding: 1rem 1.25rem;

    white-space: pre;
    max-height: 280px;

    flex: 1; padding: 11px 16px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);

    color: var(--dark);

<script>
const cards = [
  {
    cat: "CODING",
    q: "Implement useContext for language toggle across the app",
    badges: ["code","hooks"],
    answer: "Create a LanguageContext with a Provider at the app root. Expose a custom hook so any component can read or change the language without prop drilling.",
    code: `// LanguageContext.tsx
import { createContext, useContext, useState } from 'react';

type Lang = 'en' | 'hi' | 'te';
interface LangCtx {
  language: Lang;
  setLanguage: (l: Lang) => void;
}

const LanguageContext = createContext<LangCtx>({
  language: 'en',
  setLanguage: () => {},
});

export const LanguageProvider = ({ children }) => {
  const [language, setLanguage] = useState<Lang>('en');
  return (
    <LanguageContext.Provider value={{ language, setLanguage }}>
      {children}
    </LanguageContext.Provider>
  );
};

// Custom hook — use anywhere
export const useLanguage = () => useContext(LanguageContext);

// In any component
const { language, setLanguage } = useLanguage();
const toggle = () =>
  setLanguage(prev => prev === 'en' ? 'hi' : 'en');`
  },
  {
    cat: "CODING",
    q: "Build a cache with expiry — return value if fresh, null if expired",
    badges: ["code","hooks"],
    answer: "Use a useRef Map to store { value, expiry } pairs. On get(), compare Date.now() against the expiry timestamp. Return null if expired so the caller knows to re-fetch.",
    code: `import { useRef } from 'react';

export function useCache<T>(ttlMs = 5 * 60 * 1000) {
  const cache = useRef<Map<string, {
    value: T; expiry: number
  }>>(new Map());

  const get = (key: string): T | null => {
    const entry = cache.current.get(key);
    if (!entry) return null;
    if (Date.now() > entry.expiry) {
      cache.current.delete(key);
      return null; // expired — caller should re-fetch
    }
    return entry.value; // still fresh ✓
  };

  const set = (key: string, value: T) => {
    cache.current.set(key, {
      value,
      expiry: Date.now() + ttlMs
    });
  };

  return { get, set };
}

// Usage — 10 min TTL
const { get, set } = useCache<ApiResponse>(10 * 60 * 1000);
const fetchData = async (url: string) => {
  const cached = get(url);
  if (cached) return cached;
  const data = await fetch(url).then(r => r.json());
  set(url, data);
  return data;
};`
  },
  {
    cat: "CODING",
    q: "Custom state hook that returns previous value and a hasChanged boolean",
    badges: ["code","hooks"],
    answer: "Store the previous value in a useRef so it doesn't trigger re-renders. Track hasChanged in another ref. Update both synchronously before calling setState.",
    code: `import { useState, useRef, useCallback } from 'react';

export function useStateWithHistory<T>(initial: T) {
  const [value, setValueInternal] = useState<T>(initial);
  const prevRef = useRef<T | undefined>(undefined);
  const hasChangedRef = useRef(false);

  const setValue = useCallback((next: T) => {
    prevRef.current = value;
    hasChangedRef.current = next !== value;
    setValueInternal(next);
  }, [value]);

  return {
    value,
    prevValue: prevRef.current,
    hasChanged: hasChangedRef.current,
    setValue,
  };
}

// After setValue('hello') when initial was '':
// value      => 'hello'
// prevValue  => ''
// hasChanged => true`
  },
  {
    cat: "CODING",
    q: "FlatList that fetches the next page when the user reaches the last item",
    badges: ["code"],
    answer: "Use FlatList's onEndReached + onEndReachedThreshold. Track page number in state. Guard with a loading flag so multiple calls don't fire simultaneously.",
    code: `import { useState, useCallback } from 'react';
import { FlatList, ActivityIndicator } from 'react-native';

export function usePaginatedList<T>(
  fetchFn: (page: number) => Promise<T[]>
) {
  const [data, setData] = useState<T[]>([]);
  const [page, setPage] = useState(1);
  const [loading, setLoading] = useState(false);
  const [hasMore, setHasMore] = useState(true);

  const loadMore = useCallback(async () => {
    if (loading || !hasMore) return;
    setLoading(true);
    try {
      const items = await fetchFn(page);
      if (!items.length) { setHasMore(false); return; }
      setData(prev => [...prev, ...items]);
      setPage(p => p + 1);
    } finally { setLoading(false); }
  }, [loading, hasMore, page, fetchFn]);

  return { data, loading, loadMore };
}

// In component:
const { data, loading, loadMore } = usePaginatedList(fetchDoctors);

<FlatList
  data={data}
  onEndReached={loadMore}
  onEndReachedThreshold={0.2}
  ListFooterComponent={loading ? <ActivityIndicator /> : null}
/>`

  {
    cat: "CODING",
    q: "Implement search debounce — Lodash version and a plain hook version",
    badges: ["code"],
    answer: "Lodash: wrap the search callback in useMemo with debounce(). Plain hook: useEffect with setTimeout that clears on every new value — only fires after the user pauses typing.",
    code: `// ── Lodash version (used in Apollo lab test search) ──
import { useMemo } from 'react';
import debounce from 'lodash/debounce';

const debouncedSearch = useMemo(
  () => debounce(onSearch, 400),
  [onSearch]
);

// ── Plain hook — no library needed ──
import { useState, useEffect } from 'react';

export function useDebounce<T>(value: T, delay: number): T {
  const [debounced, setDebounced] = useState<T>(value);

  useEffect(() => {
    const timer = setTimeout(
      () => setDebounced(value), delay
    );
    return () => clearTimeout(timer); // clear on each keystroke
  }, [value, delay]);

  return debounced;
}

// Usage
const debouncedQuery = useDebounce(searchText, 400);

useEffect(() => {
  if (debouncedQuery) fetchResults(debouncedQuery);
}, [debouncedQuery]);`

  {
    cat: "CUSTOM HOOKS",
    q: "What is a custom hook and why do we use them?",
    badges: ["hooks"],
    answer: "A custom hook is a JS function starting with 'use' that calls other hooks inside it. It lets you extract and reuse stateful logic between components without changing the component tree.\n\nRules of Hooks still apply: only call hooks at the top level, only from React functions.",
    code: `// Pattern: extract logic → name it → reuse anywhere
export function useFetch<T>(url: string) {
  const [data, setData] = useState<T | null>(null);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState<string | null>(null);

  useEffect(() => {
    let cancelled = false;
    fetch(url)
      .then(r => r.json())
      .then(d => { if (!cancelled) setData(d); })
      .catch(e => { if (!cancelled) setError(e.message); })
      .finally(() => { if (!cancelled) setLoading(false); });
    return () => { cancelled = true; };
  }, [url]);

  return { data, loading, error };
}

// Instead of copy-pasting fetch logic in every component:
const { data, loading, error } = useFetch<Doctor[]>('/api/doctors');`

    cat: "ARCHITECTURE",
    q: "How is the New Architecture different from Old? What does Fabric do?",
    badges: ["arch"],
    answer: "Old arch: JS and Native ran on separate threads, communicating via an async JSON Bridge. No sync calls possible, all messages serialized and queued.\n\nNew Architecture — 3 pillars:\n• JSI — C++ layer replacing the bridge, enables sync native calls\n• Fabric — new UI renderer, shadow tree is a shared C++ object (no serialization needed)\n• TurboModules — native modules loaded lazily via JSI\n\nFabric impact: JS can read layout values synchronously, enabling Concurrent Mode, useTransition, and smoother animations.",
    code: `// Old — everything async through Bridge
NativeModules.MyModule.doSomething(args, callback);
// ^ JSON serialized → queued → async callback

// New (JSI) — direct C++ reference from JS
// Native object is directly referenceable
// No JSON serialization overhead
// Synchronous calls possible when needed

// TurboModules — lazy loading
// Before: ALL native modules loaded at startup
// After:  loaded on first use → faster app start

// Fabric — shared C++ shadow tree
// React's concurrent scheduler can now
// interrupt and resume UI work, just like web
// → enables useTransition, Suspense in RN`
  },
  {
    cat: "NATIVE",
    q: "How are permissions managed differently on Android vs iOS?",
    badges: ["native"],
    answer: "Android: declare all permissions in AndroidManifest.xml. Dangerous permissions (camera, location, contacts) require runtime request. Normal permissions auto-granted at install. Android 11+ has stricter background location rules.\n\niOS: declare all in Info.plist with a usage description string — App Store rejects without it. Request at runtime. No auto-reset if blocked — user must go to Settings manually.",
    code: `import { Platform, Linking } from 'react-native';
import {
  request, PERMISSIONS, RESULTS
} from 'react-native-permissions';

const requestCameraPermission = async () => {
  const result = await request(
    Platform.OS === 'ios'
      ? PERMISSIONS.IOS.CAMERA
      : PERMISSIONS.ANDROID.CAMERA
  );

  if (result === RESULTS.GRANTED) {
    openCamera();
  } else if (result === RESULTS.BLOCKED) {
    // User denied permanently → send to Settings
    Linking.openSettings();
  }
};

// iOS Info.plist (required or App Store rejects):
// NSCameraUsageDescription → "Used to scan documents"

// Android AndroidManifest.xml:
// <uses-permission android:name="android.permission.CAMERA"/>`
  },
  {
    cat: "NATIVE",
    q: "How does the push notification flow work on Android vs iOS?",
    badges: ["native"],
    answer: "Android uses FCM (Firebase Cloud Messaging).\niOS uses APNs (Apple Push Notification service) — FCM can proxy to APNs.\n\nFlow:\n1. App registers → gets FCM device token\n2. Token sent to your backend\n3. Backend calls FCM API with token + payload\n4. FCM delivers to device\n\nIn RN: onMessage() for foreground, setBackgroundMessageHandler() for background/killed.",
    code: `import messaging from '@react-native-firebase/messaging';

// 1. Request permission (required iOS, Android 13+)
await messaging().requestPermission();

// 2. Get device token
const token = await messaging().getToken();
await sendTokenToBackend(token);

// 3. Foreground — you control the display
messaging().onMessage(async remoteMessage => {
  showLocalNotification(remoteMessage.notification);
});

// 4. Background/killed — place in index.js
messaging().setBackgroundMessageHandler(
  async remoteMessage => {
    console.log('Background msg:', remoteMessage);
  }
);

// 5. App opened from notification
messaging()
  .getInitialNotification()
  .then(remoteMessage => {

  },
  {
    cat: "DEBUGGING",
    q: "Bug works locally but crashes on device — why? (Hermes + stale closure)",
    badges: ["arch","native"],
    answer: "Local/debug builds use JavaScriptCore. Release builds on Android use Hermes, which runs Promise microtasks faster and more eagerly.\n\nIf a callback closes over a Redux value via direct variable capture, Hermes can execute it before React re-renders — the closure sees a stale value.\n\nFix: use useRef to always read the latest value inside async callbacks.",
    code: `// PROBLEM — stale closure in Hermes release build
const configUrl = useSelector(s => s.config.url);

useEffect(() => {
  verifyOtp(otp).then(() => {
    // Hermes runs this before React re-renders
    callApi(configUrl); // ❌ stale value!
  });
}, [otp]);


// FIX — useRef always holds the latest value
const configUrl = useSelector(s => s.config.url);
const configUrlRef = useRef(configUrl);

useEffect(() => {
  configUrlRef.current = configUrl; // sync ref
}, [configUrl]);

useEffect(() => {
  verifyOtp(otp).then(() => {
    callApi(configUrlRef.current); // ✓ always fresh
  });
}, [otp]);

// This exact bug happened in Apollo OTP flow!`
  },
  {
    cat: "DEBUGGING",
    q: "How do you identify if a bug is in native code vs JS code?",
    badges: ["native","arch"],
    answer: "JS bug signs:\n• Reproduces on both iOS AND Android\n• Visible in Metro console / Red Box\n• Related to state, rendering, API calls\n• Has a JS stack trace\n\nNative bug signs:\n• Only ONE platform affected\n• Crash shows Obj-C/Swift (iOS) or Java/Kotlin (Android) frames\n• Related to camera, Bluetooth, permissions, hardware\n\nTools: Flipper (JS + native logs together), Xcode Instruments, Android Studio Profiler.",
    code: `// JS error — Red Box with JS stack trace
TypeError: Cannot read property 'map' of undefined
  at ProductList (ProductList.tsx:42)

// Native iOS crash — Xcode crash log
Thread 1: EXC_BAD_ACCESS (SIGSEGV)

// Native Android crash — logcat
FATAL EXCEPTION: main
java.lang.NullPointerException

// Debug approach:
// 1. Flipper → check JS console + native logs
// 2. Only one platform? → native issue
// 3. Both platforms, release only? → Hermes closure
// 4. Both platforms always? → JS logic bug`
  },
  {
    cat: "NATIVE",
    q: "AsyncStorage, redux-persist, and secure storage — how do they work?",
    badges: ["native"],
    answer: "AsyncStorage: unencrypted, async key-value store persisting across restarts. The RN equivalent of localStorage.\n\nredux-persist: serializes Redux slices to JSON on every state change and rehydrates on app restart.\n\nFor sensitive data: use react-native-encrypted-storage (Keychain on iOS, Android Keystore on Android) OR encrypt manually with AES before writing to AsyncStorage — the Apollo pattern.",
    code: `// redux-persist setup
import AsyncStorage from '@react-native-async-storage/async-storage';
import { persistReducer } from 'redux-persist';

const persistConfig = {
  key: 'root',
  storage: AsyncStorage,
  whitelist: ['auth', 'userProfile'], // only these slices
};

// ── Secure option 1: Encrypted Storage ──
import EncryptedStorage from 'react-native-encrypted-storage';
await EncryptedStorage.setItem('auth_token', token);
const token = await EncryptedStorage.getItem('auth_token');

// ── Secure option 2: Apollo encrypt/decrypt pattern ──
import CryptoJS from 'crypto-js';

const encrypt = (data: string, secret: string) =>
  CryptoJS.AES.encrypt(data, secret).toString();

const decrypt = (cipher: string, secret: string) =>
  CryptoJS.AES.decrypt(cipher, secret)
    .toString(CryptoJS.enc.Utf8);

// Store
const enc = encrypt(JSON.stringify(sensitiveData), authToken);
await AsyncStorage.setItem('secure_key', enc);

// Retrieve — fails gracefully if token expired
const cipher = await AsyncStorage.getItem('secure_key');
const data = cipher ? decrypt(cipher, authToken) : null;`
  }
];

const catClass = {
  "CODING": "cat-CODING",
  "CUSTOM HOOKS": "cat-CUSTOM-HOOKS",
  "ARCHITECTURE": "cat-ARCHITECTURE",
  "NATIVE": "cat-NATIVE",
  "DEBUGGING": "cat-DEBUGGING"
};

let current = 0;
let flipped = false;
const seen = new Set();

function render() {
  const c = cards[current];

  // question
  document.getElementById('q-text').textContent = c.q;

  // answer
  const at = document.getElementById('a-text');
  at.innerHTML = c.answer
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\n/g, '<br>');

  // code
  const codeWrap = document.getElementById('code-wrap');
  const codeEl = document.getElementById('a-code');
  if (c.code) {
    codeEl.textContent = c.code;
    codeWrap.style.display = 'block';
  } else {
    codeWrap.style.display = 'none';
  }

  // category tag
  const tag = document.getElementById('cat-tag');
  tag.textContent = c.cat;
  tag.className = 'cat-tag ' + (catClass[c.cat] || '');

  // counter + progress
  document.getElementById('counter').textContent = (current + 1) + ' / ' + cards.length;
  document.getElementById('prog').style.width = ((current + 1) / cards.length * 100) + '%';

  // badges
  const bw = document.getElementById('badges');
  bw.innerHTML = '';
  (c.badges || []).forEach(b => {
    const s = document.createElement('span');
    s.className = 'badge badge-' + b;
    const labels = { code: 'coding', hooks: 'hooks', arch: 'architecture', native: 'native' };
    s.textContent = labels[b] || b;
    bw.appendChild(s);
  });

  // flip state
  document.getElementById('scene').classList.toggle('flipped', flipped);

  // buttons
  document.getElementById('btn-prev').disabled = current === 0;
  document.getElementById('btn-next').disabled = current === cards.length - 1;

  // dots
  const dotsEl = document.getElementById('dots');
  dotsEl.innerHTML = '';
  cards.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === current ? ' active' : seen.has(i) ? ' seen' : '');
    d.title = cards[i].cat;
    d.onclick = () => goTo(i);
    dotsEl.appendChild(d);
  });
}

function flipCard() {
  flipped = !flipped;
  if (flipped) seen.add(current);
  render();
}

function goTo(i) {
  current = i;
  flipped = false;
  render();
}

function next() { if (current < cards.length - 1) goTo(current + 1); }
function prev() { if (current > 0) goTo(current - 1); }

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') next();
  else if (e.key === 'ArrowLeft') prev();
  else if (e.key === ' ') { e.preventDefault(); flipCard(); }
});

render();
</script>
</body>
</html>
